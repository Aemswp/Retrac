<!DOCTYPE html>
<html>
<head>
    <title>Retrac Login</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="login-container">

    <div class="login-box">

        <h1 class="logo">RETRAC</h1>

        <p class="subtitle">
            Enter your access key
        </p>

        <form action="/login" method="POST">

            <input
                type="text"
                name="key"
                placeholder="Access Key"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</div>

</body>
</html>
